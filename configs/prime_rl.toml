# Hosted RL training on Prime Intellect
#
# Prerequisites:
#   1. prime login
#   2. prime env push creative-writing -p environments/creative_writing
#   3. prime rl run configs/prime_rl.toml -e HF_TOKEN -e WANDB_API_KEY
#
model = "Qwen/Qwen2.5-3B-Instruct"
max_steps = 100

batch_size = 32
rollouts_per_example = 8
learning_rate = 1e-6

[sampling]
max_tokens = 512
temperature = 0.7

[[env]]
id = "qfennessy/creative-writing"
args = { num_examples = 5000 }

[wandb]
entity = "qfennessy"
project = "creative-writing-rl"
name = "creative-writing-grpo-v1"

[checkpoints]
interval = 25
keep_cloud = 4

[buffer]
online_difficulty_filtering = true
easy_threshold = 0.8
hard_threshold = 0.2
